<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHC Recruit 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #eee; }
        .dark-card { background: #141414; border: 1px solid #222; }
        .btn-divisi { transition: all 0.2s; border: 1px solid #222; background: #111; }
        .btn-divisi:hover { border-color: #555; background: #1a1a1a; transform: translateY(-2px); }
        .hide { display: none; }
    </style>
</head>
<body class="pb-10">

    <header class="sticky top-0 z-50 bg-[#0a0a0a]/80 backdrop-blur-xl border-b border-gray-900 py-4 px-6 flex items-center justify-between">
        <div>
            <h1 class="text-xl font-black tracking-tighter uppercase italic text-white leading-none">SHC RECRUIT 2026</h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Interview Management System</p>
        </div>
        <button id="btnBack" class="hide text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-white transition-colors">
            ← Kembali
        </button>
    </header>

    <main class="max-w-4xl mx-auto px-6 mt-8">
        <!-- SCREEN 1: DIVISI -->
        <div id="screenDivisions" class="space-y-6">
            <div class="space-y-1">
                <h2 class="text-3xl font-bold">Pilih Divisi</h2>
                <p class="text-gray-500">Divisi yang sedang Anda wawancarai saat ini.</p>
            </div>
            <div id="divisionGrid" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <!-- Diisi via JS -->
            </div>
        </div>

        <!-- SCREEN 2: KANDIDAT -->
        <div id="screenCandidates" class="hide space-y-6">
            <div class="space-y-1">
                <div id="currentDivName" class="text-rose-500 font-bold uppercase tracking-widest text-[10px]">DIVISI</div>
                <h2 class="text-3xl font-bold">Kandidat</h2>
                <p class="text-gray-500">Klik nama untuk memulai wawancara.</p>
            </div>
            <div id="candidateList" class="space-y-3">
                <!-- Diisi via JS -->
            </div>
        </div>

        <!-- SCREEN 3: FORM -->
        <div id="screenForm" class="hide space-y-8 max-w-2xl mx-auto">
            <div class="flex items-center gap-6 p-6 bg-[#111] rounded-3xl border border-gray-800 shadow-2xl">
                <div class="w-32 h-40 flex-shrink-0 bg-[#1e1e1e] rounded-2xl overflow-hidden border-2 border-gray-800 shadow-xl">
                    <img id="formFoto" src="" class="w-full h-full object-cover" alt="">
                </div>
                <div class="space-y-2">
                    <h2 id="formNama" class="text-3xl font-black italic uppercase tracking-tighter leading-none text-white">Nama</h2>
                    <div id="formKelas" class="text-gray-400 font-medium">Kelas</div>
                    <div id="formDivisiBadge" class="inline-block px-4 py-1.5 mt-2 bg-rose-600 text-white text-[11px] font-black uppercase rounded-full shadow-lg shadow-rose-900/40">DIVISI</div>
                </div>
            </div>

            <form id="interviewForm" class="space-y-8">
                <div class="space-y-6">
                    <div class="space-y-3">
                        <label class="block text-xs font-black text-gray-500 uppercase tracking-[0.2em]">Hasil Review Keseluruhan</label>
                        <textarea id="overallReview" required class="w-full bg-[#161616] border border-gray-800 rounded-3xl p-6 text-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-700 min-h-[300px] text-lg leading-relaxed shadow-inner placeholder:text-gray-700" placeholder="Tuliskan hasil wawancara, kelebihan, kekurangan, dan performa kandidat di sini secara detail..."></textarea>
                    </div>
                </div>

                <div class="bg-[#111] p-8 rounded-[2rem] border border-gray-800 space-y-6 shadow-2xl">
                    <h3 class="text-center font-black italic uppercase tracking-widest text-[10px] text-gray-500">Rekomendasi Akhir</h3>
                    <div class="flex gap-4">
                        <label class="flex-1 cursor-pointer group">
                            <input type="radio" name="rating" value="S" class="sr-only peer">
                            <div class="h-20 flex items-center justify-center font-black text-[11px] tracking-tighter border rounded-2xl transition-all peer-checked:bg-emerald-500 peer-checked:text-black border-emerald-900/20 bg-[#1a1a1a] group-hover:bg-[#222]">SETUJU</div>
                        </label>
                        <label class="flex-1 cursor-pointer group">
                            <input type="radio" name="rating" value="RR" class="sr-only peer">
                            <div class="h-20 flex items-center justify-center font-black text-[11px] tracking-tighter border rounded-2xl transition-all peer-checked:bg-yellow-500 peer-checked:text-black border-yellow-900/20 bg-[#1a1a1a] group-hover:bg-[#222]">RAGU-RAGU</div>
                        </label>
                        <label class="flex-1 cursor-pointer group">
                            <input type="radio" name="rating" value="TS" class="sr-only peer">
                            <div class="h-20 flex items-center justify-center font-black text-[11px] tracking-tighter border rounded-2xl transition-all peer-checked:bg-red-500 peer-checked:text-black border-red-900/20 bg-[#1a1a1a] group-hover:bg-[#222]">TDK SETUJU</div>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 pb-12">
                    <button type="button" id="btnSkip" class="p-6 bg-[#181818] border border-gray-800 rounded-3xl font-black text-[11px] uppercase tracking-widest text-gray-500 hover:bg-gray-800 transition-colors">SKIP / BATAL</button>
                    <button type="submit" id="btnSubmit" class="p-6 bg-white text-black rounded-3xl font-black text-[11px] uppercase tracking-widest hover:bg-gray-100 shadow-xl transition-all active:scale-[0.97]">SIMPAN DATA</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwMqFdsMWmo03OUC6HA0mLw2ih6gHw3VQrmfQ71FbTqXcr-a3vnBICcld4_t4k5Cr-qhw/exec";

        let candidates = [];
        let selectedDiv = "";
        let selectedCand = null;

        // =====================================================================
        // FIX UTAMA: Ekstrak Google Drive File ID dengan regex yang lebih presisi
        // Lalu buat URL proxy via GAS sendiri supaya bypass CORS
        // =====================================================================
        function extractDriveId(url) {
            if (!url || typeof url !== 'string' || url.trim() === '') return null;

            // Format: /file/d/ID/view  atau  /d/ID/
            let m = url.match(/\/d\/([a-zA-Z0-9_-]{25,})/);
            if (m) return m[1];

            // Format: ?id=ID  atau  open?id=ID
            m = url.match(/[?&]id=([a-zA-Z0-9_-]{25,})/);
            if (m) return m[1];

            // Sudah berupa ID murni (25+ karakter alphanumeric/dash/underscore)
            if (/^[a-zA-Z0-9_-]{25,}$/.test(url.trim())) return url.trim();

            return null;
        }

        // Kembalikan array URL untuk dicoba satu per satu (fallback chain)
        function getDriveFallbackChain(rawUrl) {
            if (!rawUrl) return [PLACEHOLDER];

            // Jika sudah bukan Drive URL (mis. lh3 atau placehold.co), langsung pakai
            if (rawUrl.includes('lh3.googleusercontent.com') || rawUrl.includes('placehold.co')) {
                return [rawUrl, PLACEHOLDER];
            }

            const id = extractDriveId(rawUrl);
            if (!id) return [rawUrl, PLACEHOLDER]; // URL lain, coba langsung

            return [
                // Format 1: thumbnail Google Drive (paling reliable, tidak butuh login)
                `https://drive.google.com/thumbnail?id=${id}&sz=w400`,
                // Format 2: uc?export=view (kadang minta login kalau file private)
                `https://drive.google.com/uc?export=view&id=${id}`,
                // Format 3: lh3 CDN
                `https://lh3.googleusercontent.com/d/${id}`,
                PLACEHOLDER
            ];
        }

        const PLACEHOLDER = 'https://placehold.co/300x400/1a1a1a/cccccc?text=No+Photo';

        // Set gambar dengan fallback otomatis jika gagal load
        function setImageWithFallback(imgEl, rawUrl) {
            const chain = getDriveFallbackChain(rawUrl);
            let idx = 0;

            function tryNext() {
                if (idx >= chain.length) return;
                imgEl.onerror = () => {
                    idx++;
                    tryNext();
                };
                imgEl.src = chain[idx++];
            }

            tryNext();
        }

        // Load Data
        async function loadData() {
            try {
                const res = await fetch(`${API_URL}?action=getCandidates`);
                candidates = await res.json();
                renderDivisions();
            } catch (e) {
                alert("Gagal konek ke Google Sheets!");
            }
        }

        const divisions = ["ACARA & MC", "KONSUMSI", "DESAIN", "DOKUMENTASI", "PROMOSI", "DANA USAHA", "DEKORASI", "KEAMANAN", "PERLENGKAPAN", "P3K", "SEKRETARIS/BENDAHARA", "AKOMODASI", "ART GALLERY"];

        function renderDivisions() {
            const grid = document.getElementById('divisionGrid');
            grid.innerHTML = "";
            divisions.forEach(div => {
                const btn = document.createElement('button');
                btn.className = "flex items-center gap-3 p-5 btn-divisi rounded-2xl group text-left";
                btn.innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-[#1e1e1e] flex items-center justify-center group-hover:scale-110 transition-transform">
                        <i data-lucide="clipboard-list" class="w-4 h-4 text-gray-500"></i>
                    </div>
                    <span class="font-bold text-xs uppercase tracking-wide leading-tight">${div}</span>
                `;
                btn.onclick = () => showCandidates(div);
                grid.appendChild(btn);
            });
            if (window.lucide) lucide.createIcons();
        }

        function showCandidates(div) {
            selectedDiv = div;
            document.getElementById('screenDivisions').classList.add('hide');
            document.getElementById('screenCandidates').classList.remove('hide');
            document.getElementById('btnBack').classList.remove('hide');
            document.getElementById('currentDivName').innerText = div;

            const list = document.getElementById('candidateList');
            list.innerHTML = "";
            const filtered = candidates.filter(c => c.divisi === div);

            if (filtered.length === 0) {
                list.innerHTML = "<div class='py-10 text-center text-gray-600 border border-dashed border-gray-800 rounded-3xl font-medium'>Belum ada kandidat terdaftar di divisi ini.</div>";
            } else {
                filtered.forEach(c => {
                    const row = document.createElement('button');
                    row.className = "w-full flex items-center gap-4 p-4 dark-card rounded-2xl hover:border-gray-500 transition-all text-left group";

                    // Buat elemen img dulu agar bisa pakai setImageWithFallback
                    const imgEl = document.createElement('img');
                    imgEl.className = "w-full h-full object-cover";
                    imgEl.alt = c.nama;

                    row.innerHTML = `
                        <div class="w-12 h-16 flex-shrink-0 bg-[#1e1e1e] rounded-lg overflow-hidden border border-gray-800 group-hover:border-gray-500 transition-colors thumb-wrap"></div>
                        <div>
                            <div class="font-bold leading-tight group-hover:text-white transition-colors uppercase tracking-tighter">${c.nama}</div>
                            <div class="text-[10px] text-gray-500 font-medium uppercase mt-1">${c.kelas} • ${c.ruangan || '-'}</div>
                        </div>
                    `;

                    row.querySelector('.thumb-wrap').appendChild(imgEl);
                    setImageWithFallback(imgEl, c.foto);

                    row.onclick = () => showForm(c);
                    list.appendChild(row);
                });
            }
        }

        function showForm(c) {
            selectedCand = c;
            document.getElementById('screenCandidates').classList.add('hide');
            document.getElementById('screenForm').classList.remove('hide');

            const formFoto = document.getElementById('formFoto');
            setImageWithFallback(formFoto, c.foto);

            document.getElementById('formNama').innerText = c.nama;
            document.getElementById('formKelas').innerText = c.kelas;
            document.getElementById('formDivisiBadge').innerText = "DIVISI: " + c.divisi;
            document.getElementById('overallReview').value = "";

            // Reset radio buttons
            document.querySelectorAll('input[name="rating"]').forEach(r => r.checked = false);
        }

        document.getElementById('btnBack').onclick = () => {
            const screenC = document.getElementById('screenCandidates');
            const screenF = document.getElementById('screenForm');
            if (!screenF.classList.contains('hide')) {
                screenF.classList.add('hide');
                screenC.classList.remove('hide');
            } else {
                screenC.classList.add('hide');
                document.getElementById('screenDivisions').classList.remove('hide');
                document.getElementById('btnBack').classList.add('hide');
            }
        };

        document.getElementById('btnSkip').onclick = () => {
            if (confirm("Batalkan pengisian data?")) location.reload();
        };

        document.getElementById('interviewForm').onsubmit = async (e) => {
            e.preventDefault();
            const rating = document.querySelector('input[name="rating"]:checked');
            if (!rating) return alert("Harap pilih rating rekomendasi akhir!");

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = "SEDANG MENGIRIM...";

            const payload = {
                action: 'saveInterview',
                data: {
                    candidate_id: selectedCand.candidate_id,
                    nama: selectedCand.nama,
                    divisi: selectedCand.divisi,
                    catatan: document.getElementById('overallReview').value,
                    rating: rating.value,
                    jawaban: {}
                }
            };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                alert("Data berhasil tersimpan ke Spreadsheet!");
                location.reload();
            } catch (err) {
                alert("Terjadi kesalahan saat mengirim data!");
                btn.disabled = false;
                btn.innerText = "SIMPAN DATA";
            }
        };

        loadData();
        if (window.lucide) lucide.createIcons();
    </script>
</body>
</html>
