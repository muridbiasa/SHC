<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHC 2026 - Recruitment System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #111827; }
        .dark-card { background-color: #1f2937; border: 1px solid #374151; }
        .btn-divisi { transition: all 0.2s; }
        .btn-divisi:active { transform: scale(0.95); }
    </style>
</head>
<body class="text-gray-100 min-h-screen">

    <!-- Container Utama -->
    <div id="app" class="max-w-md mx-auto p-4 pb-24">
        
        <!-- HEADER GLOBAL -->
        <header class="text-center mb-8 pt-4">
            <h1 class="text-2xl font-extrabold tracking-tight text-white">SHC RECRUITMENT 2026</h1>
            <p class="text-gray-400 text-sm mt-1">Sedes Home Concert Interview Panel</p>
        </header>

        <!-- LAYAR 1: PILIH DIVISI -->
        <div id="layer-divisi" class="grid grid-cols-2 gap-3 animate-fade-in">
            <!-- Buttons dynamically generated here -->
        </div>

        <!-- LAYAR 2: PILIH KANDIDAT -->
        <div id="layer-kandidat" class="hidden space-y-4">
            <div class="flex items-center justify-between mb-4">
                <button onclick="showLayer('divisi')" class="text-gray-400 flex items-center gap-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                    Kembali ke Divisi
                </button>
                <span id="label-divisi-aktif" class="bg-blue-600 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest text-white"></span>
            </div>
            <div id="list-kandidat" class="space-y-3">
                <!-- Candidate list items here -->
            </div>
        </div>

        <!-- LAYAR 3: FORM WAWANCARA -->
        <div id="layer-form" class="hidden">
            <button onclick="showLayer('kandidat')" class="text-gray-400 flex items-center gap-2 text-sm mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                Batal / Kembali
            </button>

            <!-- Profile Header -->
            <div class="dark-card rounded-2xl p-6 mb-6 flex flex-col items-center text-center">
                <img id="form-foto" src="" alt="Avatar" class="w-24 h-24 rounded-full border-4 border-gray-700 object-cover mb-4 shadow-xl">
                <h2 id="form-nama" class="text-xl font-bold text-white"></h2>
                <p id="form-kelas-divisi" class="text-gray-400 text-sm"></p>
            </div>

            <!-- Dynamic Form -->
            <form id="interview-form" class="space-y-6">
                <div id="dynamic-questions" class="space-y-6">
                    <!-- Questions loop -->
                </div>

                <div class="pt-4 border-t border-gray-700">
                    <label class="block text-sm font-bold text-gray-400 uppercase tracking-widest mb-2">Catatan Tambahan</label>
                    <textarea id="catatan" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 focus:ring-2 focus:ring-blue-500 outline-none text-gray-200 min-h-[120px]"></textarea>
                </div>

                <!-- Rating -->
                <div class="pt-4">
                    <label class="block text-sm font-bold text-gray-400 uppercase tracking-widest mb-4 text-center">Rekomendasi Kelulusan</label>
                    <div class="grid grid-cols-3 gap-2">
                        <label class="flex flex-col items-center justify-center p-4 dark-card rounded-xl cursor-pointer border-2 border-transparent has-[:checked]:border-emerald-500 has-[:checked]:bg-emerald-500/10">
                            <input type="radio" name="rating" value="S" class="hidden" required>
                            <span class="text-xl font-bold text-emerald-400">S</span>
                            <span class="text-[10px] uppercase mt-1">Setuju</span>
                        </label>
                        <label class="flex flex-col items-center justify-center p-4 dark-card rounded-xl cursor-pointer border-2 border-transparent has-[:checked]:border-yellow-500 has-[:checked]:bg-yellow-500/10">
                            <input type="radio" name="rating" value="RR" class="hidden">
                            <span class="text-xl font-bold text-yellow-400">RR</span>
                            <span class="text-[10px] uppercase mt-1">Ragu</span>
                        </label>
                        <label class="flex flex-col items-center justify-center p-4 dark-card rounded-xl cursor-pointer border-2 border-transparent has-[:checked]:border-red-500 has-[:checked]:bg-red-500/10">
                            <input type="radio" name="rating" value="TS" class="hidden">
                            <span class="text-xl font-bold text-red-400">TS</span>
                            <span class="text-[10px] uppercase mt-1">Tolak</span>
                        </label>
                    </div>
                </div>

                <button type="submit" id="btn-submit" class="w-full bg-white text-black py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    SIMPAN & SUBMIT
                </button>
            </form>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-3 rounded-full font-bold shadow-2xl hidden z-50 animate-bounce"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwMqFdsMWmo03OUC6HA0mLw2ih6gHw3VQrmfQ71FbTqXcr-a3vnBICcld4_t4k5Cr-qhw/exec";

        const bankPertanyaan = {
            "KONSUMSI": ["Bagaimana caramu mengatur makanan untuk ratusan orang?", "Ada peserta alergi makanan, apa solusimu?", "Apakah punya kenalan vendor?"],
            "ACARA & MC": ["Apa inovasi acaramu?", "Rundown ngaret 20 menit, langkahmu?", "Jika listrik mati dan chaos, apa yang kamu lakukan?"],
            "DESAIN": ["Software desain apa yang dikuasai?", "Sikapmu jika ada revisi dadakan H-1?", "Tunjukkan portofolio terbaikmu!"],
            "DOKUMENTASI": ["Kamera lowbat di tengah acara, solusimu?", "Ada momen terlewat karena tidak ada pembagian tugas, tindakanmu?", "Hasil foto banyak yang blur padahal harus diedit saat itu juga. Langkahmu?"],
            "PROMOSI": ["Cara tingkatkan minat siswa agar beli tiket?", "Engagement medsos rendah, strategimu?", "Menghadapi komentar negatif/hate speech di IG?"],
            "DANA USAHA": ["Strategi mencari sponsor dalam 1 bulan?", "Jika target dana kurang 10 juta di H-7, apa yang kamu lakukan?"],
            "DEKORASI": ["Anggaran dipotong tapi konsep ingin mewah, solusinya?", "H-1 konsep diubah ketua, padahal bahan sudah dibeli. Tindakanmu?"],
            "KEAMANAN": ["Ada penonton luar sekolah bikin rusuh, langkah pertamamu?", "Bagaimana menjaga area VIP tetap steril?"],
            "PERLENGKAPAN": ["Barang sewaan rusak oleh panitia lain, siapa yang tanggung jawab?", "H-1 mic dan kabel roll kurang, tindakanmu?"],
            "P3K": ["Peserta tiba-tiba kejang, apa yang kamu lakukan di 1 menit pertama?", "Ada yang berdarah kena cutter dan ada yang sesak napas, mana yang ditangani duluan?"],
            "SEKRETARIS/BENDAHARA": ["Ada pengeluaran dadakan tanpa nota, bagaimana kamu mencatatnya?", "Sponsor minta proposal besok tapi format belum fix, strategimu?"],
            "AKOMODASI": ["Artis datang 3 jam lebih cepat, ruangan belum siap. Tindakanmu?", "Artis minta barang aneh yang tidak ada di rider, dipenuhi atau tidak?"],
            "ART GALLERY": ["Karya rusak disenggol teman sendiri, dilaporkan atau tidak?", "Sponsor maksa pasang logo besar di galeri yang merusak estetika, responmu?"]
        };

        let dbKandidat = [];
        let selectedDivisi = "";
        let selectedKandidat = null;

        // Inisialisasi: Pilih Divisi
        function initDivisi() {
            const container = document.getElementById('layer-divisi');
            Object.keys(bankPertanyaan).forEach(div => {
                const btn = document.createElement('button');
                btn.className = "dark-card p-4 rounded-2xl text-sm font-bold btn-divisi hover:bg-gray-800 text-center flex flex-col justify-center min-h-[80px]";
                btn.innerHTML = `<span class="text-blue-400 text-xs mb-1">DIVISI</span>${div}`;
                btn.onclick = () => selectDivisi(div);
                container.appendChild(btn);
            });
        }

        async function selectDivisi(div) {
            selectedDivisi = div;
            document.getElementById('label-divisi-aktif').innerText = div;
            showLayer('kandidat');
            
            const listContainer = document.getElementById('list-kandidat');
            listContainer.innerHTML = '<div class="text-center py-10 text-gray-500 italic">Mengambil data...</div>';

            try {
                const resp = await fetch(`${API_URL}?action=getCandidates&divisi=${encodeURIComponent(div)}`);
                const result = await resp.json();
                dbKandidat = result.data || [];
                
                listContainer.innerHTML = "";
                if(dbKandidat.length === 0) {
                    listContainer.innerHTML = '<div class="text-center py-10 text-gray-500">Tidak ada kandidat di divisi ini.</div>';
                }

                dbKandidat.forEach(k => {
                    const el = document.createElement('div');
                    el.className = "dark-card p-4 rounded-2xl flex items-center gap-4 cursor-pointer hover:bg-gray-800 active:scale-95 transition-all";
                    el.innerHTML = `
                        <img src="${k.foto || 'https://via.placeholder.com/150'}" class="w-12 h-12 rounded-full border border-gray-600 bg-gray-700">
                        <div>
                            <div class="font-bold text-white">${k.nama}</div>
                            <div class="text-xs text-gray-500">${k.kelas}</div>
                        </div>
                    `;
                    el.onclick = () => startInterview(k);
                    listContainer.appendChild(el);
                });
            } catch (e) {
                listContainer.innerHTML = '<div class="text-center py-10 text-red-500">Error mengambil data. Cek koneksi.</div>';
            }
        }

        function startInterview(k) {
            selectedKandidat = k;
            document.getElementById('form-foto').src = k.foto || 'https://via.placeholder.com/150';
            document.getElementById('form-nama').innerText = k.nama;
            document.getElementById('form-kelas-divisi').innerText = `${k.kelas} | ${k.divisi}`;
            
            const questions = bankPertanyaan[selectedDivisi] || [];
            const qContainer = document.getElementById('dynamic-questions');
            qContainer.innerHTML = "";

            questions.forEach((q, idx) => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <label class="block text-sm font-medium text-gray-300 mb-2 leading-relaxed">${idx+1}. ${q}</label>
                    <textarea name="q_${idx}" data-pertanyaan="${q}" required class="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 focus:ring-2 focus:ring-blue-500 outline-none text-gray-200 min-h-[80px]" placeholder="Jawaban..."></textarea>
                `;
                qContainer.appendChild(div);
            });

            showLayer('form');
        }

        function showLayer(layer) {
            document.getElementById('layer-divisi').classList.add('hidden');
            document.getElementById('layer-kandidat').classList.add('hidden');
            document.getElementById('layer-form').classList.add('hidden');
            document.getElementById(`layer-${layer}`).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        document.getElementById('interview-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerText = "MENGIRIM...";

            const jawaban = {};
            const textareas = document.querySelectorAll('#dynamic-questions textarea');
            textareas.forEach(ta => {
                jawaban[ta.dataset.pertanyaan] = ta.value;
            });

            const payload = {
                action: 'saveInterview',
                data: {
                    candidate_id: selectedKandidat.candidate_id || "",
                    nama: selectedKandidat.nama,
                    divisi: selectedKandidat.divisi,
                    jawaban: JSON.stringify(jawaban),
                    catatan: document.getElementById('catatan').value,
                    rating: document.querySelector('input[name="rating"]:checked').value
                }
            };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                
                showToast("BERHASIL DISIMPAN!");
                setTimeout(() => {
                    document.getElementById('interview-form').reset();
                    showLayer('kandidat');
                    btn.disabled = false;
                    btn.innerText = "SIMPAN & SUBMIT";
                }, 1500);
            } catch (err) {
                alert("Gagal mengirim data.");
                btn.disabled = false;
                btn.innerText = "SIMPAN & SUBMIT";
            }
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        initDivisi();
    </script>
</body>
</html>
