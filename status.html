<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <title>SHC 2026 - Hasil Seleksi</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a0f;--surface:#14141c;--card:#1e1e2a;
      --border:#2a2a3a;--accent:#7c6bff;--accent-light:#9b8eff;
      --text:#f0eeff;--text-secondary:#b8b5d0;--muted:#7a7794;
      --success:#2ed573;--danger:#ff4757;
      --radius-md:12px;--radius-lg:16px;--radius-xl:20px;
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
    
    .menu-toggle{display:none;position:fixed;top:calc(12px + var(--safe-top));left:12px;z-index:1100;width:44px;height:44px;background:var(--accent);border:none;border-radius:var(--radius-md);color:white;font-size:22px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(124,107,255,0.3)}
    .overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:999;opacity:0;transition:opacity 0.3s ease}
    .overlay.show{display:block;opacity:1}
    
    .container{display:flex;min-height:100dvh}
    
    .sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);padding:calc(24px + var(--safe-top)) 16px 24px;position:fixed;height:100dvh;left:0;top:0;z-index:1000;transition:transform 0.3s ease}
    .logo{font-size:24px;font-weight:800;background:linear-gradient(135deg,#9b8eff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:32px;padding:0 8px}
    .menu-title{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:12px;letter-spacing:0.8px;padding:0 8px}
    .menu-btn{display:flex;align-items:center;gap:10px;width:100%;padding:14px;background:var(--accent);border:none;border-radius:var(--radius-md);color:white;font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.2s}
    .menu-btn:active{opacity:0.8}
    .menu-btn-icon{font-size:20px}
    .sidebar-info{margin-top:auto;padding:16px 8px;border-top:1px solid var(--border);position:absolute;bottom:0;left:0;right:0}
    .sidebar-info p{font-size:11px;color:var(--muted);text-align:center}
    
    .main{margin-left:260px;flex:1;padding:calc(24px + var(--safe-top)) 24px calc(24px + var(--safe-bottom));min-height:100dvh}
    .header{margin-bottom:24px}
    .header h1{font-size:24px;font-weight:800;margin-bottom:8px}
    .header p{color:var(--muted);font-size:13px}
    
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;text-align:center}
    .stat-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px}
    .stat-value{font-size:26px;font-weight:800}
    .stat-value.green{color:var(--success)}
    .stat-value.red{color:var(--danger)}
    .stat-value.purple{color:var(--accent-light)}
    
    .search-box{position:relative;margin-bottom:20px}
    .search-input{width:100%;padding:14px 16px 14px 44px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text);font-size:14px;font-family:inherit}
    .search-input:focus{outline:none;border-color:var(--accent)}
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
    
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all 0.25s;position:relative}
    .card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,107,255,0.12)}
    .card:active{transform:scale(0.98)}
    .card-header{display:flex;gap:14px;align-items:center}
    .photo{width:64px;height:82px;border-radius:var(--radius-md);object-fit:cover;background:var(--card);border:1px solid var(--border);flex-shrink:0}
    .photo.placeholder{display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--muted)}
    .info{flex:1;min-width:0}
    .name{font-size:15px;font-weight:700;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .class{font-size:12px;color:var(--accent-light);font-weight:600;background:rgba(124,107,255,0.1);padding:4px 10px;border-radius:6px;display:inline-block}
    
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--muted)}
    .spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--muted);text-align:center}
    .empty-icon{font-size:48px;margin-bottom:16px}
    
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100dvh;background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity 0.3s ease}
    .modal-overlay.active{display:flex;opacity:1}
    .modal{background:var(--surface);width:100%;max-width:420px;border-radius:var(--radius-xl);padding:32px;text-align:center;border:1px solid var(--border);animation:slideUp 0.3s ease;max-height:90dvh;overflow-y:auto}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .modal-photo{width:100px;height:128px;border-radius:var(--radius-lg);object-fit:cover;margin:0 auto 20px;background:var(--card);border:2px solid var(--border)}
    .modal-photo.placeholder{display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--muted)}
    .modal-name{font-size:20px;font-weight:800;margin-bottom:6px}
    .modal-class{font-size:14px;color:var(--accent-light);margin-bottom:24px;font-weight:600}
    .result-box{background:var(--card);border-radius:var(--radius-lg);padding:28px 20px;margin-bottom:20px;border:1px solid var(--border)}
    .result-icon{font-size:56px;margin-bottom:12px}
    .result-title{font-size:22px;font-weight:800;margin-bottom:6px}
    .result-title.lolos{color:var(--success)}
    .result-title.tidak{color:var(--danger)}
    .result-text{color:var(--muted);font-size:13px;line-height:1.5}
    .close-btn{background:var(--accent);color:white;border:none;padding:16px 32px;border-radius:var(--radius-md);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:opacity 0.2s}
    .close-btn:active{opacity:0.8}
    
    @media(max-width:768px){
      .menu-toggle{display:flex}
      .sidebar{width:280px;transform:translateX(-100%);padding-top:calc(60px + var(--safe-top))}
      .sidebar.open{transform:translateX(0);box-shadow:4px 0 32px rgba(0,0,0,0.5)}
      .main{margin-left:0;padding:calc(64px + var(--safe-top)) 16px calc(20px + var(--safe-bottom))}
      .header h1{font-size:20px;padding-right:50px}
      .header p{font-size:12px}
      .stats{grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
      .stat-card{padding:10px 6px;border-radius:var(--radius-md)}
      .stat-label{font-size:9px;margin-bottom:4px;line-height:1.2}
      .stat-value{font-size:20px}
      .search-box{margin-bottom:16px}
      .search-input{padding:12px 14px 12px 40px;font-size:14px;border-radius:var(--radius-md)}
      .search-icon{left:12px;font-size:14px}
      .grid{grid-template-columns:1fr;gap:12px}
      .card{padding:14px;border-radius:var(--radius-md)}
      .card-header{gap:12px}
      .photo{width:56px;height:72px;border-radius:var(--radius-md)}
      .photo.placeholder{font-size:28px}
      .name{font-size:14px;margin-bottom:4px}
      .class{font-size:11px;padding:3px 8px}
      .modal-overlay{padding:0;align-items:flex-end}
      .modal{max-width:100%;max-height:92dvh;border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:24px 20px calc(24px + var(--safe-bottom));animation:slideUp 0.3s ease}
      @keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
      .modal-photo{width:80px;height:102px;border-radius:var(--radius-md);margin-bottom:16px}
      .modal-photo.placeholder{font-size:40px}
      .modal-name{font-size:18px;margin-bottom:4px}
      .modal-class{font-size:13px;margin-bottom:20px}
      .result-box{padding:24px 16px;margin-bottom:16px}
      .result-icon{font-size:48px;margin-bottom:10px}
      .result-title{font-size:20px;margin-bottom:4px}
      .result-text{font-size:12px}
      .close-btn{padding:14px 24px;font-size:14px;position:sticky;bottom:0}
      .loading{padding:60px 20px}
      .spinner{width:40px;height:40px}
    }
    
    @media(max-width:380px){
      .header h1{font-size:18px}
      .stat-value{font-size:18px}
      .stat-label{font-size:8px}
    }
  </style>
</head>
<body>
  <button class="menu-toggle" onclick="toggleMenu()" aria-label="Toggle menu">☰</button>
  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

  <div class="container">
    <aside class="sidebar" id="sidebar">
      <div class="logo">SHC 2026</div>
      <div class="menu-title">Menu</div>
      <button class="menu-btn">
        <span class="menu-btn-icon">📋</span>
        <span>Semua Kandidat</span>
      </button>
      <div class="sidebar-info">
        <p>© SHC 2026 - Panitia Seleksi</p>
      </div>
    </aside>

    <main class="main">
      <div class="header">
        <h1>Hasil Seleksi SHC 2026</h1>
        <p>Klik nama kandidat untuk melihat hasil</p>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Total</div>
          <div class="stat-value purple" id="totalKandidat">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Lolos</div>
          <div class="stat-value green" id="totalLolos">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Tidak Lolos</div>
          <div class="stat-value red" id="totalTidak">0</div>
        </div>
      </div>

      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Cari nama atau kelas..." oninput="handleSearch(this.value)">
      </div>

      <div id="content" class="grid">
        <div class="loading">
          <div class="spinner"></div>
          <p>Memuat data...</p>
        </div>
      </div>
    </main>
  </div>

  <!-- MODAL HASIL -->
  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div id="modalPhoto"></div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-class" id="modalClass"></div>
      
      <div class="result-box">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-text" id="resultText"></div>
      </div>
      
      <button class="close-btn" onclick="closeModal()">Tutup</button>
    </div>
  </div>

  <script>
    const API_BASE = "https://script.google.com/macros/s/AKfycbxdxvu5292m_Bsb3wRIKQKKKxhRutdvBh9tgQrfQqjIpfqsS53ZxwMEfUX7qkBWXQWCpQ/exec";
    
    let allData = [];
    let filteredData = [];

    function toggleMenu() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');
      const isOpen = sidebar.classList.contains('open');
      sidebar.classList.toggle('open');
      overlay.classList.toggle('show');
      document.body.style.overflow = isOpen ? '' : 'hidden';
    }

    async function loadData() {
      try {
        const response = await fetch(API_BASE + '?action=getFinalSelectionData&filterType=all');
        const result = await response.json();
        
        if (result.success) {
          allData = result.data || [];
          filteredData = allData;
          
          document.getElementById('totalKandidat').textContent = allData.length;
          document.getElementById('totalLolos').textContent = result.countLolos || 0;
          document.getElementById('totalTidak').textContent = result.countTidakLolos || 0;
          
          renderCards();
        }
      } catch (error) {
        document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Gagal memuat data</p></div>';
      }
    }

    function renderCards() {
      const content = document.getElementById('content');
      
      if (filteredData.length === 0) {
        content.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>Tidak ada data kandidat</p></div>';
        return;
      }

      const html = filteredData.map((c, idx) => {
        const fotoHtml = c.foto 
          ? `<img class="photo" src="${convertDriveUrl(c.foto)}" alt="Foto" loading="lazy" onerror="this.outerHTML='<div class=\\'photo placeholder\\'>👤</div>'">`
          : `<div class="photo placeholder">👤</div>`;

        return `
          <div class="card" onclick="showResult(${idx})">
            <div class="card-header">
              ${fotoHtml}
              <div class="info">
                <div class="name">${escHtml(c.nama)}</div>
                <span class="class">Kelas ${escHtml(c.kelas)}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');

      content.innerHTML = html;
    }

    function showResult(idx) {
      const c = filteredData[idx];
      if (!c) return;

      const modal = document.getElementById('modal');
      const isLolos = c.finalStatus === 'lolos';

      document.getElementById('modalPhoto').innerHTML = c.foto
        ? `<img class="modal-photo" src="${convertDriveUrl(c.foto)}" alt="Foto" onerror="this.outerHTML='<div class=\\'modal-photo placeholder\\'>👤</div>'">`
        : `<div class="modal-photo placeholder">👤</div>`;

      document.getElementById('modalName').textContent = c.nama;
      document.getElementById('modalClass').textContent = 'Kelas ' + c.kelas;

      if (isLolos) {
        document.getElementById('resultIcon').textContent = '🎉';
        document.getElementById('resultTitle').textContent = 'KAMU LOLOS!';
        document.getElementById('resultTitle').className = 'result-title lolos';
        document.getElementById('resultText').textContent = 'Selamat! Kamu diterima di SHC 2026';
      } else {
        document.getElementById('resultIcon').textContent = '😔';
        document.getElementById('resultTitle').textContent = 'KAMU TIDAK LOLOS';
        document.getElementById('resultTitle').className = 'result-title tidak';
        document.getElementById('resultText').textContent = 'Maaf, kamu belum beruntung kali ini. Tetap semangat!';
      }

      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(e) {
      if (!e || e.target.id === 'modal') {
        document.getElementById('modal').classList.remove('active');
        document.body.style.overflow = '';
      }
    }

    function handleSearch(query) {
      if (!query || !query.trim()) {
        filteredData = allData;
      } else {
        const q = query.toLowerCase();
        filteredData = allData.filter(c => 
          (c.nama && c.nama.toLowerCase().includes(q)) ||
          (c.kelas && String(c.kelas).toLowerCase().includes(q))
        );
      }
      renderCards();
    }

    function convertDriveUrl(url) {
      if (!url) return '';
      const match = String(url).match(/\/d\/([a-zA-Z0-9-_]{25,})/) || String(url).match(/[?&]id=([a-zA-Z0-9-_]{25,})/);
      return match ? `https://lh3.googleusercontent.com/d/${match[1]}` : url;
    }

    function escHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    window.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
