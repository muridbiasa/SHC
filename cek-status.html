<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Status Seleksi — SHC 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            color: #00d9ff;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        .header p {
            color: #a0a0a0;
            font-size: 1.1em;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #00d9ff;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00d9ff;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }

        .result {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            margin-top: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-photo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #00d9ff;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
        }

        .status-badge {
            display: inline-block;
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.2em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-lolos {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .status-cadangan {
            background: linear-gradient(135deg, #ffa500 0%, #cc8400 100%);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.4);
        }

        .status-tidak-lolos {
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.4);
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .data-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            border-radius: 10px;
            border-left: 4px solid #00d9ff;
        }

        .data-label {
            color: #00d9ff;
            font-size: 0.9em;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .data-value {
            color: #fff;
            font-size: 1.1em;
            font-weight: 500;
        }

        .error {
            background: rgba(255, 68, 68, 0.2);
            border: 2px solid #ff4444;
            color: #ff4444;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        .error.show {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .profile-photo {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎭 SHC 2026</h1>
            <p>Cek Status Kelulusan Seleksi Panitia</p>
        </div>

        <div class="search-box">
            <div class="form-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" placeholder="Masukkan nama lengkap sesuai formulir">
            </div>
            <div class="form-group">
                <label for="tgl_lahir">Tanggal Lahir</label>
                <input type="date" id="tgl_lahir">
            </div>
            <button class="btn" onclick="cekStatus()">Cek Status Saya</button>
            <div class="error" id="error"></div>
        </div>

        <div class="result" id="result">
            <div class="profile-header">
                <img src="" alt="Foto Profil" class="profile-photo" id="foto">
                <div id="statusBadge"></div>
            </div>
            <div class="data-grid" id="dataGrid"></div>
        </div>

        <div class="footer">
            <p>SHC 2026 · Sistem Informasi Seleksi Panitia · Hasil bersifat final</p>
        </div>
    </div>

    <script>
        // ============================================
        // CARA UPDATE DATA BARU:
        // 1. Tambahkan data baru di dalam array 'dataPeserta' di bawah
        // 2. Format: { nama, tgl_lahir, foto, status, data_pribadi: {} }
        // 3. Simpan file HTML ini
        // 4. Selesai! Tidak perlu edit bagian lain
        // ============================================
        
        const dataPeserta = [
            {
                nama: "Cindy Aurelia Renata Kurniawan",
                tgl_lahir: "2009-08-02",
                foto: "https://drive.google.com/open?id=15YivcvL2QQLFKgBZb2MZ0kSYjjKx-qqt",
                status: "LOLOS",
                data_pribadi: {
                    "Kelas": "XI-A1",
                    "Nomor HP": "085781761400",
                    "Divisi Dipilih": "Akomodasi",
                    "Status Seleksi": "Diterima"
                }
            },
            {
                nama: "Nathanael Axel Sutanto",
                tgl_lahir: "2010-12-09",
                foto: "https://drive.google.com/open?id=1UT3eNFWbaxPLbwZGlwJTKoFIC5F1mN_1",
                status: "LOLOS",
                data_pribadi: {
                    "Kelas": "X-8",
                    "Nomor HP": "082328889797",
                    "Divisi Dipilih": "Dokumentasi",
                    "Status Seleksi": "Diterima"
                }
            },
            {
                nama: "Evangeline Gwen Hebertson",
                tgl_lahir: "2010-02-02",
                foto: "https://drive.google.com/open?id=1hCZmAWL-7_hUiApSz2vQXpmTktm-40he",
                status: "CADANGAN",
                data_pribadi: {
                    "Kelas": "X-2",
                    "Nomor HP": "082339596866",
                    "Divisi Dipilih": "Sekretaris, Acara, Art Gallery",
                    "Status Seleksi": "Cadangan"
                }
            },
            // ============================================
            // TAMBAHKAN DATA BARU DI ATAS BARIS INI
            // Copy format di atas dan ganti datanya
            // ============================================
        ];

        function cekStatus() {
            const namaInput = document.getElementById('nama').value.trim().toLowerCase();
            const tglInput = document.getElementById('tgl_lahir').value;
            const errorDiv = document.getElementById('error');
            const resultDiv = document.getElementById('result');

            errorDiv.classList.remove('show');
            resultDiv.classList.remove('show');

            if (!namaInput || !tglInput) {
                errorDiv.textContent = "⚠️ Mohon isi nama lengkap dan tanggal lahir!";
                errorDiv.classList.add('show');
                return;
            }

            const peserta = dataPeserta.find(p => 
                p.nama.toLowerCase() === namaInput && p.tgl_lahir === tglInput
            );

            if (!peserta) {
                errorDiv.textContent = "❌ Data tidak ditemukan. Periksa kembali nama dan tanggal lahir Anda.";
                errorDiv.classList.add('show');
                return;
            }

            // Tampilkan foto
            document.getElementById('foto').src = peserta.foto;

            // Tampilkan status
            const statusBadge = document.getElementById('statusBadge');
            statusBadge.className = 'status-badge';
            
            if (peserta.status === 'LOLOS') {
                statusBadge.classList.add('status-lolos');
                statusBadge.textContent = '✅ LOLOS SELEKSI';
            } else if (peserta.status === 'CADANGAN') {
                statusBadge.classList.add('status-cadangan');
                statusBadge.textContent = '⏳ CADANGAN';
            } else {
                statusBadge.classList.add('status-tidak-lolos');
                statusBadge.textContent = '❌ TIDAK LOLOS';
            }

            // Tampilkan data pribadi
            const dataGrid = document.getElementById('dataGrid');
            dataGrid.innerHTML = '';
            
            for (const [key, value] of Object.entries(peserta.data_pribadi)) {
                const dataItem = document.createElement('div');
                dataItem.className = 'data-item';
                dataItem.innerHTML = `
                    <div class="data-label">${key}</div>
                    <div class="data-value">${value}</div>
                `;
                dataGrid.appendChild(dataItem);
            }

            resultDiv.classList.add('show');
        }

        // Enter key support
        document.getElementById('nama').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('tgl_lahir').focus();
        });
        
        document.getElementById('tgl_lahir').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') cekStatus();
        });
    </script>
</body>
</html>
