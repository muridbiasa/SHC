<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f13">
  <title>Dashboard Review SHC 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0f;--surface:#14141c;--surface-2:#1e1e2a;--card:#232330;--border:#2a2a3a;--accent:#7c6bff;--accent-light:#9b8eff;--text:#f0eeff;--text-secondary:#b8b5d0;--muted:#7a7794;--star-1:#ff4757;--star-2:#ff9f43;--star-3:#2ed573;--star-4:#7c6bff;--radius-md:12px;--radius-lg:16px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;font-size:14px}
    body{background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
    .dashboard{display:flex;min-height:100dvh}
    .sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);padding:calc(20px + var(--safe-top)) 12px 20px;position:fixed;height:100dvh;overflow-y:auto;z-index:1000;left:0;top:0;transition:transform 0.3s ease}
    .sidebar-header{padding:8px 8px 16px;border-bottom:1px solid var(--border);margin-bottom:16px}
    .sidebar-logo{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--accent-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .sidebar-subtitle{font-size:11px;color:var(--muted)}
    .sidebar-title{font-size:10px;font-weight:700;color:var(--muted);margin:10px 0;text-transform:uppercase;letter-spacing:0.8px;padding:0 8px}
    .div-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;margin-bottom:4px;background:transparent;border:1px solid transparent;border-radius:var(--radius-md);color:var(--text-secondary);font-size:13px;font-weight:500;text-align:left;cursor:pointer;transition:all 0.2s ease;min-height:44px;font-family:inherit}
    .div-btn:hover{background:rgba(124,107,255,0.08);color:var(--text)}
    .div-btn.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:600}
    .div-btn-icon{font-size:16px;flex-shrink:0}
    .result-badge-count{margin-left:auto;background:rgba(255,255,255,0.1);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
    .menu-toggle{display:none;position:fixed;top:calc(12px + var(--safe-top));left:12px;z-index:1100;width:48px;height:48px;background:var(--accent);border:none;border-radius:var(--radius-md);color:white;font-size:20px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(124,107,255,0.25)}
    .overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);z-index:999;opacity:0;transition:opacity 0.3s ease}
    .overlay.show{display:block;opacity:1}
    .main{margin-left:280px;flex:1;padding:calc(24px + var(--safe-top)) 24px calc(24px + var(--safe-bottom));min-height:100dvh}
    .header{margin-bottom:24px}
    .header h1{font-size:22px;font-weight:800}
    .header p{color:var(--muted);font-size:13px;margin-top:8px}
    .search-wrapper{margin:16px 0 20px}
    .search-box{position:relative;max-width:100%}
    .search-input{width:100%;padding:10px 14px 10px 36px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text);font-family:inherit;font-size:13px;transition:border-color 0.2s ease}
    .search-input:focus{outline:none;border-color:var(--accent)}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
    .search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px;display:none}
    .search-clear.visible{display:block}
    .stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px}
    .stat-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase}
    .stat-value{font-size:24px;font-weight:800;color:var(--accent-light);margin-top:4px}
    .candidate-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;display:flex;gap:14px;cursor:pointer;transition:all 0.25s ease;position:relative}
    .card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 24px rgba(124,107,255,0.15)}
    .card-photo{width:70px;height:90px;border-radius:var(--radius-md);object-fit:cover;flex-shrink:0;background:var(--card);border:1px solid var(--border)}
    .card-photo.placeholder{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:32px}
    .card-info{flex:1;min-width:0}
    .card-name{font-size:15px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-class{font-size:12px;color:var(--accent-light);font-weight:600;background:rgba(124,107,255,0.1);padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:6px}
    .card-status-badge{position:absolute;top:12px;right:12px;padding:4px 8px;border-radius:6px;font-size:10px;font-weight:800;text-transform:uppercase}
    .badge-lolos{background:rgba(46,213,115,0.2);color:var(--star-3);border:1px solid var(--star-3)}
    .badge-cadangan{background:rgba(255,159,67,0.2);color:var(--star-2);border:1px solid var(--star-2)}
    .badge-tolak{background:rgba(255,71,87,0.2);color:var(--star-1);border:1px solid var(--star-1)}
    .rating-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
    .rating-item{background:var(--card);border-radius:8px;padding:8px 10px;border:1px solid var(--border)}
    .rating-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
    .rating-badge{font-size:11px;font-weight:800;padding:2px 8px;border-radius:4px}
    .rating-badge[data-rating="1"]{background:rgba(255,71,87,0.15);color:var(--star-1)}
    .rating-badge[data-rating="2"]{background:rgba(255,159,67,0.15);color:var(--star-2)}
    .rating-badge[data-rating="3"]{background:rgba(46,213,115,0.15);color:var(--star-3)}
    .rating-badge[data-rating="4"]{background:rgba(124,107,255,0.15);color:var(--star-4)}
    .rating-div{font-size:11px;font-weight:600;color:var(--text-secondary)}
    .selection-buttons{display:flex;gap:8px;margin-top:12px}
    .btn-status{flex:1;padding:8px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit}
    .btn-status:disabled{opacity:0.4;cursor:not-allowed}
    .btn-terima{background:rgba(46,213,115,0.2);color:var(--star-3);border:1px solid var(--star-3)}
    .btn-terima:hover:not(:disabled){background:var(--star-3);color:white}
    .btn-cadangan{background:rgba(255,159,67,0.2);color:var(--star-2);border:1px solid var(--star-2)}
    .btn-cadangan:hover:not(:disabled){background:var(--star-2);color:white}
    .btn-tolak{background:rgba(255,71,87,0.2);color:var(--star-1);border:1px solid var(--star-1)}
    .btn-tolak:hover:not(:disabled){background:var(--star-1);color:white}
    .loading,.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--muted);text-align:center}
    .spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.9s linear infinite;margin-bottom:16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100dvh;background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity 0.3s ease}
    .modal-overlay.active{display:flex;opacity:1}
    .modal-content{background:var(--surface);width:100%;max-width:680px;max-height:85dvh;border-radius:var(--radius-lg);display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,0.5);border:1px solid var(--border)}
    .modal-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:16px;flex-shrink:0}
    .modal-close{margin-left:auto;width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .modal-photo{width:72px;height:92px;border-radius:var(--radius-md);object-fit:cover;background:var(--card);flex-shrink:0;border:1px solid var(--border)}
    .modal-photo.placeholder{display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--muted)}
    .modal-title{font-size:18px;font-weight:800;line-height:1.3}
    .modal-subtitle{font-size:13px;color:var(--accent-light);margin-top:4px;font-weight:600}
    .modal-body{padding:20px;overflow-y:auto;flex:1}
    .modal-section{margin-bottom:24px}
    .modal-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:12px;letter-spacing:0.6px}
    .modal-rating-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin-bottom:12px}
    .modal-rating-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .modal-rating-badge{font-size:13px;font-weight:800;padding:4px 10px;border-radius:6px}
    .modal-rating-reason{font-size:13px;color:var(--text-secondary);line-height:1.6;white-space:pre-wrap;padding-top:8px;border-top:1px solid var(--border);margin-top:8px}
    
    /* Style khusus untuk Change Status di Modal Hasil */
    .change-status-group { margin-top: 20px; padding: 15px; background: var(--card); border-radius: var(--radius-md); border: 1px solid var(--border); }
    .change-status-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
    .change-status-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .btn-change { padding: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary); border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-change:hover { background: var(--surface-2); color: var(--text); }
    .btn-change.active-lolos { background: var(--star-3); color: white; border-color: var(--star-3); }
    .btn-change.active-cadangan { background: var(--star-2); color: white; border-color: var(--star-2); }
    .btn-change.active-tolak { background: var(--star-1); color: white; border-color: var(--star-1); }

    .toast{position:fixed;bottom:calc(20px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 20px;font-size:13px;font-weight:600;opacity:0;transition:all 0.3s;z-index:9999}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .toast.success{border-left:4px solid var(--star-3);color:var(--star-3)}
    .toast.error{border-left:4px solid var(--star-1);color:var(--star-1)}
    @media(max-width:768px){
      .menu-toggle{display:flex!important}
      .sidebar{width:85vw;max-width:320px;transform:translateX(-100%);padding-top:calc(60px + var(--safe-top))}
      .sidebar.open{transform:translateX(0);box-shadow:4px 0 32px rgba(0,0,0,0.5)}
      .main{margin-left:0;width:100%;padding:calc(70px + var(--safe-top)) 16px calc(20px + var(--safe-bottom))}
      .candidate-grid{grid-template-columns:1fr;gap:12px}
      .modal-overlay{align-items:flex-end;padding:0}
      .modal-content{max-width:100%;max-height:92dvh;border-radius:var(--radius-lg) var(--radius-lg) 0 0;margin-bottom:var(--safe-bottom)}
      .change-status-options { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <button class="menu-toggle" onclick="toggleMenu()" aria-label="Toggle menu">☰</button>
  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

  <div class="dashboard">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">SHC 2026</div>
        <div class="sidebar-subtitle">Dashboard Review</div>
      </div>
      
      <div class="sidebar-title">Review Per Divisi</div>
      <div id="divisionList"></div>

      <div class="sidebar-title" style="margin-top:24px;">Hasil Akhir Seleksi</div>
      <div id="resultCategoryList">
        <!-- Akan diisi oleh JS -->
      </div>
    </aside>

    <main class="main">
      <div class="header">
        <h1 id="pageTitle">📊 Review Kandidat</h1>
        <p id="pageDesc">Klik kartu untuk melihat detail rating & komentar</p>
        <div class="search-wrapper">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Cari nama atau kelas..." autocomplete="off">
            <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
          </div>
        </div>
      </div>
      
      <div class="stats-bar" id="statsBar" style="display:none">
        <div class="stat-card"><div class="stat-label">Total Data</div><div class="stat-value" id="statTotal">0</div></div>
        <div class="stat-card" id="statAvgCard" style="display:none"><div class="stat-label">Rata-rata Nilai</div><div class="stat-value" id="statAvg">0</div></div>
      </div>

      <div id="content">
        <div class="loading"><div class="spinner"></div><p>Memuat data...</p></div>
      </div>
    </main>
  </div>

  <!-- Modal Detail -->
  <div class="modal-overlay" id="detailModal" onclick="closeModalOnBackdrop(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div id="modalPhoto"></div>
        <div style="flex:1">
          <div class="modal-title" id="modalName">—</div>
          <div class="modal-subtitle" id="modalClass">—</div>
          <div style="font-size:12px;color:var(--muted);margin-top:4px;">Rata-rata: <span id="modalAvg" style="color:var(--text);font-weight:bold;">-</span></div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-section">
          <div class="modal-label">📝 Rating & Alasan</div>
          <div id="modalRatings"></div>
        </div>
        
        <!-- Bagian Ganti Status (Hanya muncul di mode Hasil Akhir) -->
        <div id="modalChangeStatusSection" class="change-status-group" style="display:none;">
          <div class="change-status-title">🔄 Ubah Status Akhir</div>
          <div class="change-status-options">
            <button class="btn-change" id="btnSetLolos" onclick="changeFinalStatus('lolos')">✅ Lolos</button>
            <button class="btn-change" id="btnSetCadangan" onclick="changeFinalStatus('cadangan')">⚠️ Cadangan</button>
            <button class="btn-change" id="btnSetTolak" onclick="changeFinalStatus('tolak')">❌ Tidak Lolos</button>
          </div>
          <p style="font-size:10px;color:var(--muted);margin-top:8px;">Perubahan akan disimpan otomatis ke Sheet Data terkait.</p>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = "https://script.google.com/macros/s/AKfycbxdxvu5292m_Bsb3wRIKQKKKxhRutdvBh9tgQrfQqjIpfqsS53ZxwMEfUX7qkBWXQWCpQ/exec";
    let currentView = 'divisi'; // 'divisi' atau 'hasil'
    let currentFilter = 'all'; // 'all' atau nama divisi
    let currentResultCategory = 'all'; // 'lolos', 'cadangan', 'tolak'
    let allCandidatesData = [];
    let searchTimeout = null;
    let currentSearchQuery = '';
    let selectedCandidateForChange = null; // Menyimpan data kandidat yang sedang dibuka di modal hasil

    function debounce(func, delay) {
      return function(...args) {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => func.apply(this, args), delay);
      };
    }

    function toggleMenu() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');
      const isOpen = sidebar.classList.contains('open');
      sidebar.classList.toggle('open');
      overlay.classList.toggle('show');
      document.body.style.overflow = isOpen ? '' : 'hidden';
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await loadDivisions();
      await loadResultCategories(); // Load menu hasil akhir
      await loadCandidates('all'); // Default view
      
      const searchInput = document.getElementById('searchInput');
      if (searchInput) searchInput.addEventListener('input', debounce(handleSearch, 300));
    });

    async function loadDivisions() {
      try {
        const res = await fetch(`${API_BASE}?action=getDashboardDivisions`);
        const data = await res.json();
        if (!data.success) throw new Error(data.error);
        
        const list = document.getElementById('divisionList');
        list.innerHTML = '';
        data.data.forEach(d => {
          const btn = document.createElement('button');
          btn.className = 'div-btn' + (d.id === 'all' ? ' active' : '');
          btn.innerHTML = `<span class="div-btn-icon">${d.name.split(' ')[0] || '📋'}</span> <span>${d.name.split(' ').slice(1).join(' ') || d.name}</span>`;
          btn.onclick = async () => {
            document.querySelectorAll('.div-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('#resultCategoryList .div-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentView = 'divisi';
            currentFilter = d.id;
            document.getElementById('pageTitle').innerText = d.id === 'all' ? '📊 Review Semua Divisi' : `📊 Review ${d.name}`;
            document.getElementById('pageDesc').innerText = 'Klik kartu untuk melihat detail rating & komentar';
            document.getElementById('modalChangeStatusSection').style.display = 'none'; // Hide change status
            await loadCandidates(d.id);
            if (window.innerWidth <= 768) toggleMenu();
          };
          list.appendChild(btn);
        });
      } catch (err) { console.error(err); }
    }

    async function loadResultCategories() {
      const list = document.getElementById('resultCategoryList');
      list.innerHTML = '';
      const categories = [
        {id:'all', name:'📂 Semua Data', color:'#7a7794'},
        {id:'lolos', name:'✅ Lolos', color:'#2ed573'},
        {id:'cadangan', name:'⚠️ Cadangan', color:'#ff9f43'},
        {id:'tolak', name:'❌ Tidak Lolos', color:'#ff4757'}
      ];

      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'div-btn';
        btn.innerHTML = `<span class="div-btn-icon" style="color:${cat.color}">●</span> <span>${cat.name}</span> <span class="result-badge-count" id="count-${cat.id}">0</span>`;
        btn.onclick = async () => {
          document.querySelectorAll('.div-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentView = 'hasil';
          currentResultCategory = cat.id;
          document.getElementById('pageTitle').innerText = `Hasil Seleksi: ${cat.name}`;
          document.getElementById('pageDesc').innerText = 'Data terpisah otomatis ke Sheet. Klik kartu untuk ubah status.';
          document.getElementById('modalChangeStatusSection').style.display = 'block'; // Show change status
          await loadFinalResults(cat.id);
          if (window.innerWidth <= 768) toggleMenu();
        };
        list.appendChild(btn);
      });
    }

    async function loadCandidates(divisi) {
      const content = document.getElementById('content');
      const statsBar = document.getElementById('statsBar');
      content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Memuat data...</p></div>';
      statsBar.style.display = 'none';
      
      try {
        const res = await fetch(`${API_BASE}?action=getDashboardData&divisi=${divisi}`);
        const result = await res.json();
        if (!result.success) throw new Error(result.error);
        
        allCandidatesData = result.data || [];
        document.getElementById('statTotal').textContent = allCandidatesData.length;
        statsBar.style.display = 'grid';
        document.getElementById('statAvgCard').style.display = 'none';
        
        renderCandidates(allCandidatesData);
      } catch (err) { content.innerHTML = `<div class="empty"><p>⚠️ ${err.message}</p></div>`; }
    }

    async function loadFinalResults(category) {
      const content = document.getElementById('content');
      const statsBar = document.getElementById('statsBar');
      content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Menghitung rata-rata dinamis...</p></div>';
      statsBar.style.display = 'none';
      
      try {
        const res = await fetch(`${API_BASE}?action=getFinalResults&category=${category}`);
        const result = await res.json();
        if (!result.success) throw new Error(result.error);
        
        allCandidatesData = result.data || [];
        const total = result.total || allCandidatesData.length;
        
        // Update Counter di Sidebar
        if (category === 'all') {
           // Hitung ulang semua jika perlu, atau biarkan 0 untuk 'all'
           // Lebih baik update semua counter saat load 'all'
           // Tapi untuk efisiensi, kita update counter saat klik kategori spesifik saja atau lakukan fetch terpisah
           // Di sini kita update counter untuk kategori yang diklik
           document.getElementById(`count-${category}`).textContent = total;
        } else {
           document.getElementById(`count-${category}`).textContent = total;
        }

        document.getElementById('statTotal').textContent = total;
        
        // Hitung rata-rata global untuk statistik
        if (total > 0) {
          let sumAvg = 0;
          allCandidatesData.forEach(c => sumAvg += parseFloat(c.averageScore));
          let globalAvg = (sumAvg / total).toFixed(2);
          document.getElementById('statAvg').textContent = globalAvg;
          document.getElementById('statAvgCard').style.display = 'block';
        }

        statsBar.style.display = 'grid';
        renderCandidates(allCandidatesData);
      } catch (err) { content.innerHTML = `<div class="empty"><p>⚠️ ${err.message}</p></div>`; }
    }

    function handleSearch(e) {
      currentSearchQuery = e.target.value;
      const clearBtn = document.getElementById('searchClear');
      clearBtn.classList.toggle('visible', currentSearchQuery.length > 0);
      const filtered = allCandidatesData.filter(c => (c.nama && c.nama.toLowerCase().includes(currentSearchQuery.toLowerCase())) || (c.kelas && String(c.kelas).toLowerCase().includes(currentSearchQuery.toLowerCase())));
      renderCandidates(filtered);
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      currentSearchQuery = '';
      document.getElementById('searchClear').classList.remove('visible');
      if (currentView === 'divisi') renderCandidates(allCandidatesData);
      else renderCandidates(allCandidatesData); // Reload from source if needed, but simple filter is fine for session
    }

    function renderCandidates(candidates) {
      const content = document.getElementById('content');
      if (!candidates || candidates.length === 0) {
        content.innerHTML = `<div class="empty"><p>Tidak ada data ditemukan.</p></div>`;
        return;
      }
      
      const cardHtmlArray = candidates.map((c, idx) => {
        const fotoUrl = convertDriveUrl(c.foto);
        const fotoHtml = fotoUrl 
          ? `<img class="card-photo" src="${fotoUrl}" alt="Foto" loading="lazy" onerror="this.outerHTML='<div class=\\'card-photo placeholder\\'>👤</div>'">`
          : '<div class="card-photo placeholder">👤</div>';
        
        // Tentukan badge status
        let statusBadge = '';
        if (currentView === 'hasil') {
          if (c.determinedStatus === 'lolos') statusBadge = '<span class="card-status-badge badge-lolos">LOLOS</span>';
          else if (c.determinedStatus === 'cadangan') statusBadge = '<span class="card-status-badge badge-cadangan">CADANGAN</span>';
          else statusBadge = '<span class="card-status-badge badge-tolak">TIDAK LOLOS</span>';
        }

        const ratingsHtml = Object.values(c.ratings).map(r => 
          `<div class="rating-item"><div class="rating-header"><span class="rating-badge" data-rating="${r.rating}">★ ${r.rating}</span><span class="rating-div">${r.divName}</span></div>${r.alasan ? `<div class="rating-reason">${r.alasan}</div>` : ''}</div>`
        ).join('');
        
        // Tombol aksi hanya muncul di view divisi
        let actionButtons = '';
        if (currentView === 'divisi' && currentFilter !== 'all' && c.ratings?.[currentFilter]) {
           // Logika tombol terima/cadangan/tolak lama (opsional, bisa disembunyikan jika fokus ke hasil akhir)
           // Kita biarkan kosong untuk fokus ke fitur baru, atau tampilkan jika perlu
        }
        
        return `<div class="card" onclick="openModal(${idx})">
          ${statusBadge}
          ${fotoHtml}
          <div class="card-info">
            <div class="card-name">${c.nama}</div>
            <span class="card-class">Kelas ${c.kelas}</span>
            ${currentView === 'hasil' ? `<div style="font-size:11px;color:var(--muted);margin-top:4px;">Nilai Rata-rata: <strong style="color:var(--text)">${c.averageScore}</strong></div>` : ''}
            <div class="rating-list">${ratingsHtml}</div>
            ${actionButtons}
          </div>
        </div>`;
      });
      
      content.innerHTML = `<div class="candidate-grid">${cardHtmlArray.join('')}</div>`;
    }

    function openModal(idx) {
      const c = allCandidatesData[idx];
      if (!c) return;
      
      selectedCandidateForChange = c; // Simpan referensi untuk fitur ganti status
      
      const fotoUrl = convertDriveUrl(c.foto);
      document.getElementById('modalPhoto').innerHTML = fotoUrl 
        ? `<img class="modal-photo" src="${fotoUrl}" alt="Foto" loading="lazy" onerror="this.outerHTML='<div class=\\'modal-photo placeholder\\'>👤</div>'">`
        : '<div class="modal-photo placeholder">👤</div>';
      
      document.getElementById('modalName').textContent = c.nama;
      document.getElementById('modalClass').textContent = 'Kelas ' + c.kelas;
      document.getElementById('modalAvg').textContent = c.averageScore || '-';
      
      const ratingsHtml = Object.values(c.ratings).map(r => 
        `<div class="modal-rating-card">
          <div class="modal-rating-header">
            <span class="modal-rating-badge" data-rating="${r.rating}">★ ${r.rating}</span>
            <span class="modal-rating-div">${r.divName}</span>
          </div>
          <div class="modal-rating-reason">${r.alasan || 'Tidak ada alasan'}</div>
        </div>`
      ).join('');
      
      document.getElementById('modalRatings').innerHTML = ratingsHtml;
      
      // Setup tombol change status
      if (currentView === 'hasil') {
        document.getElementById('modalChangeStatusSection').style.display = 'block';
        // Reset active classes
        document.getElementById('btnSetLolos').className = 'btn-change';
        document.getElementById('btnSetCadangan').className = 'btn-change';
        document.getElementById('btnSetTolak').className = 'btn-change';
        
        // Set active based on current status
        if (c.determinedStatus === 'lolos') document.getElementById('btnSetLolos').classList.add('active-lolos');
        else if (c.determinedStatus === 'cadangan') document.getElementById('btnSetCadangan').classList.add('active-cadangan');
        else document.getElementById('btnSetTolak').classList.add('active-tolak');
      } else {
        document.getElementById('modalChangeStatusSection').style.display = 'none';
      }

      document.getElementById('detailModal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('detailModal').classList.remove('active');
      document.body.style.overflow = '';
      selectedCandidateForChange = null;
    }
    
    function closeModalOnBackdrop(e) { 
      if (e.target === e.currentTarget) closeModal(); 
    }

    // Fungsi Baru: Ganti Status Akhir
    async function changeFinalStatus(newStatus) {
      if (!selectedCandidateForChange) return;
      
      const nama = selectedCandidateForChange.nama;
      const note = "Diubah via Dashboard"; // Bisa ditambahkan input textarea jika mau
      
      const btnMap = {
        'lolos': document.getElementById('btnSetLolos'),
        'cadangan': document.getElementById('btnSetCadangan'),
        'tolak': document.getElementById('btnSetTolak')
      };
      
      // Loading state
      const originalText = btnMap[newStatus].innerText;
      btnMap[newStatus].innerText = 'Menyimpan...';
      
      try {
        const params = new URLSearchParams();
        params.append('action', 'updateFinalStatus');
        params.append('nama', nama);
        params.append('statusBaru', newStatus);
        params.append('adminNote', note);
        
        const res = await fetch(API_BASE, { method: 'POST', body: params });
        const result = await res.json();
        
        if (result.success) {
          showToast(`✅ Status diubah menjadi ${newStatus.toUpperCase()}`, 'success');
          closeModal();
          // Refresh data kategori yang sedang aktif
          await loadFinalResults(currentResultCategory);
        } else {
          showToast('Gagal: ' + result.message, 'error');
        }
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      } finally {
        btnMap[newStatus].innerText = originalText;
      }
    }
    
    function convertDriveUrl(url) {
      if (!url) return '';
      const match = url.match(/\/d\/([a-zA-Z0-9-_]{25,})/) || url.match(/[?&]id=([a-zA-Z0-9-_]{25,})/);
      return match ? `https://lh3.googleusercontent.com/d/${match[1]}` : url;
    }
    
    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg; 
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
