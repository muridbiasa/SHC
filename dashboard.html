<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Review SHC 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .candidate-card { transition: all 0.2s ease; }
    .candidate-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
    .status-badge { font-size: 0.7rem; padding: 0.25rem 0.5rem; border-radius: 9999px; font-weight: 600; }
    .status-terima { background: #10b981; color: white; }
    .status-cadangan { background: #f59e0b; color: white; }
    .status-tolak { background: #ef4444; color: white; }
    .rating-badge { font-size: 0.75rem; padding: 0.2rem 0.4rem; border-radius: 0.375rem; font-weight: 700; }
    .rating-high { background: #10b981; color: white; }
    .rating-mid { background: #f59e0b; color: white; }
    .rating-low { background: #ef4444; color: white; }
    .pass-indicator { color: #10b981; font-weight: 700; }
    .fail-indicator { color: #ef4444; font-weight: 700; }
    .btn-undo { background: #6b7280; color: white; padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; cursor: pointer; }
    .btn-undo:hover { background: #4b5563; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
    .modal-content { background: white; margin: 5% auto; padding: 1.5rem; border-radius: 0.5rem; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin-right: 0.5rem; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Header -->
  <header class="bg-white shadow-sm border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button id="menuToggle" class="p-2 hover:bg-gray-100 rounded-lg lg:hidden">
          <i class="fas fa-bars text-gray-600"></i>
        </button>
        <h1 class="text-xl font-bold text-gray-800">🎭 SHC 2026</h1>
        <span class="hidden sm:inline text-sm text-gray-500">|</span>
        <h2 class="text-lg font-semibold text-blue-600 hidden sm:block">Dashboard Review</h2>
      </div>
      <div class="flex items-center gap-2">
        <span id="statsTotal" class="text-sm text-gray-600 hidden sm:inline">Total: <span class="font-bold">0</span></span>
        <span id="statsReviewed" class="text-sm text-gray-600 hidden sm:inline">| Direview: <span class="font-bold">0</span></span>
      </div>
    </div>
  </header>

  <div class="flex">
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-40 w-64 bg-white border-r transform -translate-x-full lg:translate-x-0 transition-transform duration-200 ease-in-out overflow-y-auto">
      <div class="p-4">
        <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">🎭 Divisi</h3>
        <nav id="divisionNav" class="space-y-1">
          <!-- Divisions will be injected here -->
        </nav>
        
        <div class="mt-6 pt-4 border-t">
          <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">⚙️ Kuota</h3>
          <div id="quotaDisplay" class="space-y-2 text-sm">
            <!-- Quota info will be injected here -->
          </div>
        </div>
      </div>
    </aside>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden lg:hidden"></div>

    <!-- Main Content -->
    <main class="flex-1 p-4 lg:p-6">
      <!-- Search & Filter -->
      <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
        <div class="flex flex-col sm:flex-row gap-3">
          <div class="relative flex-1">
            <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="searchInput" placeholder="🔍 Cari: nama, kelas, divisi..." 
                   class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
            <button id="clearSearch" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 hidden">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <select id="filterStatus" class="px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <option value="all">📊 Semua Status</option>
            <option value="pending">⏳ Belum Direview</option>
            <option value="reviewed">✅ Sudah Direview</option>
            <option value="pass">🟢 Lolos (>3)</option>
            <option value="fail">🔴 Tidak Lolos (≤3)</option>
          </select>
        </div>
      </div>

      <!-- Stats Cards -->
      <div id="statsCards" class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
        <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-blue-500">
          <div class="text-2xl font-bold text-gray-800" id="statTotal">0</div>
          <div class="text-xs text-gray-500">Total Kandidat</div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-green-500">
          <div class="text-2xl font-bold text-gray-800" id="statPass">0</div>
          <div class="text-xs text-gray-500">Lolos (>3)</div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-yellow-500">
          <div class="text-2xl font-bold text-gray-800" id="statPending">0</div>
          <div class="text-xs text-gray-500">Belum Direview</div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-purple-500">
          <div class="text-2xl font-bold text-gray-800" id="statReviewed">0</div>
          <div class="text-xs text-gray-500">Sudah Direview</div>
        </div>
      </div>

      <!-- Candidates Grid -->
      <div id="candidatesGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        <!-- Cards will be injected here -->
      </div>

      <!-- Loading State -->
      <div id="loadingState" class="loading hidden">
        <div class="spinner"></div>
        <span class="text-gray-600">Memuat data...</span>
      </div>

      <!-- Empty State -->
      <div id="emptyState" class="text-center py-12 hidden">
        <i class="fas fa-search text-gray-300 text-4xl mb-3"></i>
        <p class="text-gray-500">Tidak ada kandidat yang ditemukan</p>
      </div>
    </main>
  </div>

  <!-- Rating Modal -->
  <div id="ratingModal" class="modal">
    <div class="modal-content">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold text-gray-800">📝 Review Kandidat</h3>
        <button id="closeModal" class="text-gray-400 hover:text-gray-600">
          <i class="fas fa-times text-xl"></i>
        </button>
      </div>
      
      <div id="modalCandidateInfo" class="mb-4 p-3 bg-gray-50 rounded-lg">
        <!-- Candidate info injected here -->
      </div>
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">⭐ Rating (1-4)</label>
          <div class="flex gap-2">
            <button type="button" data-rating="1" class="rating-btn flex-1 py-2 px-3 border-2 border-gray-200 rounded-lg hover:border-blue-500 hover:bg-blue-50 transition">1 ⭐</button>
            <button type="button" data-rating="2" class="rating-btn flex-1 py-2 px-3 border-2 border-gray-200 rounded-lg hover:border-blue-500 hover:bg-blue-50 transition">2 ⭐⭐</button>
            <button type="button" data-rating="3" class="rating-btn flex-1 py-2 px-3 border-2 border-gray-200 rounded-lg hover:border-blue-500 hover:bg-blue-50 transition">3 ⭐⭐⭐</button>
            <button type="button" data-rating="4" class="rating-btn flex-1 py-2 px-3 border-2 border-gray-200 rounded-lg hover:border-blue-500 hover:bg-blue-50 transition">4 ⭐⭐⭐⭐</button>
          </div>
          <input type="hidden" id="selectedRating">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">💬 Alasan & Komentar <span class="text-red-500">*</span></label>
          <textarea id="reviewComment" rows="4" class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Tulis alasan minimal 100 karakter..."></textarea>
          <div class="text-xs text-gray-500 mt-1"><span id="charCount">0</span>/100 karakter minimal</div>
        </div>
        
        <button id="saveReviewBtn" class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition font-medium disabled:opacity-50 disabled:cursor-not-allowed" disabled>
          💾 Simpan Review
        </button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="fixed bottom-4 right-4 bg-gray-800 text-white px-4 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50">
    <span id="toastMessage"></span>
  </div>

  <script>
    // ⭐ GLOBAL STATE
    const state = {
      currentDivisi: 'all',
      candidates: [],
      filteredCandidates: [],
      quotas: {},
      currentCandidate: null,
      selectedRating: null
    };

    // ⭐ API HELPER
    const API_BASE = 'https://script.google.com/macros/s/AKfycbxdxvu5292m_Bsb3wRIKQKKKxhRutdvBh9tgQrfQqjIpfqsS53ZxwMEfUX7qkBWXQWCpQ/exec';
    
    async function apiCall(action, params = {}, method = 'GET') {
      const url = new URL(API_BASE);
      url.searchParams.append('action', action);
      Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
      
      const options = {
        method: method,
        mode: 'cors',
        cache: 'no-cache'
      };
      
      if (method === 'POST') {
        options.body = new URLSearchParams(params);
      }
      
      try {
        const response = await fetch(url, options);
        return await response.json();
      } catch (error) {
        console.error('API Error:', error);
        showToast('❌ Koneksi gagal. Coba refresh halaman.', 'error');
        return { success: false, error: error.message };
      }
    }

    // ⭐ INIT
    document.addEventListener('DOMContentLoaded', async () => {
      setupEventListeners();
      await loadDivisions();
      await loadQuotas();
      await loadDashboardData();
    });

    // ⭐ EVENT LISTENERS
    function setupEventListeners() {
      // Mobile menu toggle
      document.getElementById('menuToggle').addEventListener('click', toggleSidebar);
      document.getElementById('sidebarOverlay').addEventListener('click', toggleSidebar);
      
      // Search
      document.getElementById('searchInput').addEventListener('input', debounce(filterCandidates, 300));
      document.getElementById('clearSearch').addEventListener('click', () => {
        document.getElementById('searchInput').value = '';
        document.getElementById('clearSearch').classList.add('hidden');
        filterCandidates();
      });
      
      // Filter status
      document.getElementById('filterStatus').addEventListener('change', filterCandidates);
      
      // Rating modal
      document.querySelectorAll('.rating-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const rating = parseInt(e.target.dataset.rating);
          document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('border-blue-500', 'bg-blue-50'));
          e.target.classList.add('border-blue-500', 'bg-blue-50');
          state.selectedRating = rating;
          document.getElementById('selectedRating').value = rating;
          updateSaveButton();
        });
      });
      
      document.getElementById('reviewComment').addEventListener('input', (e) => {
        document.getElementById('charCount').textContent = e.target.value.length;
        updateSaveButton();
      });
      
      document.getElementById('closeModal').addEventListener('click', closeModal);
      document.getElementById('saveReviewBtn').addEventListener('click', saveReview);
      
      // Modal close on outside click
      document.getElementById('ratingModal').addEventListener('click', (e) => {
        if (e.target.id === 'ratingModal') closeModal();
      });
    }

    // ⭐ UI FUNCTIONS
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.toggle('-translate-x-full');
      overlay.classList.toggle('hidden');
    }

    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toastMessage');
      
      toastMsg.textContent = message;
      toast.className = `fixed bottom-4 right-4 px-4 py-3 rounded-lg shadow-lg transition-all duration-300 z-50 ${
        type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-gray-800'
      } text-white`;
      
      toast.classList.remove('translate-y-20', 'opacity-0');
      
      setTimeout(() => {
        toast.classList.add('translate-y-20', 'opacity-0');
      }, 3000);
    }

    function updateSaveButton() {
      const rating = state.selectedRating;
      const comment = document.getElementById('reviewComment').value.trim();
      const btn = document.getElementById('saveReviewBtn');
      
      btn.disabled = !(rating && comment.length >= 100);
    }

    function closeModal() {
      document.getElementById('ratingModal').style.display = 'none';
      state.currentCandidate = null;
      state.selectedRating = null;
      document.getElementById('reviewComment').value = '';
      document.getElementById('charCount').textContent = '0';
      document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('border-blue-500', 'bg-blue-50'));
      document.getElementById('selectedRating').value = '';
    }

    function openModal(candidate, divisi) {
      state.currentCandidate = { ...candidate, currentDivisi: divisi };
      
      const info = document.getElementById('modalCandidateInfo');
      info.innerHTML = `
        <div class="flex items-center gap-3">
          <img src="${candidate.foto || 'https://via.placeholder.com/40?text=👤'}" 
               class="w-12 h-12 rounded-full object-cover border-2 border-gray-200" 
               onerror="this.src='https://via.placeholder.com/40?text=👤'">
          <div>
            <div class="font-bold text-gray-800">${candidate.nama}</div>
            <div class="text-sm text-gray-500">${candidate.kelas}</div>
          </div>
        </div>
        ${candidate.divisiDilamar ? `<div class="mt-2 text-xs text-gray-600">Divisi: ${candidate.divisiDilamar.join(', ')}</div>` : ''}
      `;
      
      document.getElementById('ratingModal').style.display = 'block';
    }

    // ⭐ DATA LOADING
    async function loadDivisions() {
      showLoading(true);
      const result = await apiCall('getDashboardDivisions');
      showLoading(false);
      
      if (result.success) {
        const nav = document.getElementById('divisionNav');
        nav.innerHTML = result.data.map(div => `
          <button onclick="selectDivision('${div.id}')" 
                  class="w-full text-left px-3 py-2 rounded-lg hover:bg-gray-100 transition flex items-center gap-2 ${state.currentDivisi === div.id ? 'bg-blue-100 text-blue-700 font-medium' : 'text-gray-700'}">
            ${div.name}
          </button>
        `).join('');
      }
    }

    async function loadQuotas() {
      const result = await apiCall('getQuotaConfig');
      if (result.success) {
        state.quotas = {};
        result.data.forEach(q => {
          state.quotas[q.divisi_id] = q;
        });
        renderQuotaDisplay();
      }
    }

    function renderQuotaDisplay() {
      const container = document.getElementById('quotaDisplay');
      if (state.currentDivisi === 'all') {
        container.innerHTML = '<div class="text-gray-500 text-sm">Pilih divisi untuk lihat kuota</div>';
        return;
      }
      
      const quota = state.quotas[state.currentDivisi];
      if (!quota) {
        container.innerHTML = '<div class="text-gray-500 text-sm">Kuota belum diatur</div>';
        return;
      }
      
      container.innerHTML = `
        <div class="flex justify-between items-center">
          <span class="text-gray-600">Anggota:</span>
          <span class="font-bold text-gray-800">${quota.kuota_anggota}</span>
        </div>
        <div class="flex justify-between items-center">
          <span class="text-gray-600">Cadangan:</span>
          <span class="font-bold text-gray-800">${quota.kuota_cadangan}</span>
        </div>
      `;
    }

    async function loadDashboardData() {
      showLoading(true);
      const result = await apiCall('getDashboardData', { divisi: state.currentDivisi });
      showLoading(false);
      
      if (result.success) {
        state.candidates = result.data;
        updateStats();
        filterCandidates();
      } else {
        showToast('❌ Gagal memuat data', 'error');
      }
    }

    function updateStats() {
      const total = state.candidates.length;
      const pass = state.candidates.filter(c => c.isPass).length;
      const pending = state.candidates.filter(c => Object.keys(c.ratings).length === 0).length;
      const reviewed = total - pending;
      
      document.getElementById('statTotal').textContent = total;
      document.getElementById('statPass').textContent = pass;
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statReviewed').textContent = reviewed;
      
      document.getElementById('statsTotal').innerHTML = `Total: <span class="font-bold">${total}</span>`;
      document.getElementById('statsReviewed').innerHTML = `| Direview: <span class="font-bold">${reviewed}</span>`;
    }

    function filterCandidates() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
      const statusFilter = document.getElementById('filterStatus').value;
      const clearBtn = document.getElementById('clearSearch');
      
      if (searchTerm) {
        clearBtn.classList.remove('hidden');
      } else {
        clearBtn.classList.add('hidden');
      }
      
      state.filteredCandidates = state.candidates.filter(c => {
        // Search filter
        if (searchTerm) {
          const matchSearch = 
            c.nama.toLowerCase().includes(searchTerm) ||
            c.kelas.toLowerCase().includes(searchTerm) ||
            (c.divisiDilamar && c.divisiDilamar.some(d => d.includes(searchTerm)));
          if (!matchSearch) return false;
        }
        
        // Status filter
        if (statusFilter === 'pending' && Object.keys(c.ratings).length > 0) return false;
        if (statusFilter === 'reviewed' && Object.keys(c.ratings).length === 0) return false;
        if (statusFilter === 'pass' && !c.isPass) return false;
        if (statusFilter === 'fail' && c.isPass) return false;
        
        return true;
      });
      
      renderCandidates();
    }

    function renderCandidates() {
      const grid = document.getElementById('candidatesGrid');
      const loading = document.getElementById('loadingState');
      const empty = document.getElementById('emptyState');
      
      if (state.filteredCandidates.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      
      empty.classList.add('hidden');
      
      grid.innerHTML = state.filteredCandidates.map(candidate => {
        const ratingStats = candidate.ratingStats || { avg: 0, count: 0, isPass: false };
        const status = candidate.selectionStatus[state.currentDivisi] || '';
        const hasRating = Object.keys(candidate.ratings).length > 0;
        
        return `
          <div class="candidate-card bg-white rounded-xl shadow-sm border border-gray-100 p-4 cursor-pointer hover:border-blue-300"
               onclick="openCandidateDetail('${candidate.nama.replace(/'/g, "\\'")}', '${state.currentDivisi}')">
            <div class="flex items-start gap-3">
              <img src="${candidate.foto || 'https://via.placeholder.com/48?text=👤'}" 
                   class="w-12 h-12 rounded-full object-cover border-2 border-gray-200 flex-shrink-0"
                   onerror="this.src='https://via.placeholder.com/48?text=👤'">
              <div class="flex-1 min-w-0">
                <div class="flex items-center justify-between gap-2">
                  <h4 class="font-semibold text-gray-800 truncate">${candidate.nama}</h4>
                  ${status ? `<span class="status-badge status-${status}">${status.toUpperCase()}</span>` : ''}
                </div>
                <div class="text-sm text-gray-500">${candidate.kelas}</div>
                
                ${hasRating ? `
                  <div class="mt-2 flex items-center gap-2 flex-wrap">
                    <span class="rating-badge ${ratingStats.avg > 3 ? 'rating-high' : ratingStats.avg > 2 ? 'rating-mid' : 'rating-low'}">
                      ⭐ ${ratingStats.avg.toFixed(1)} (${ratingStats.count} divisi)
                    </span>
                    <span class="${ratingStats.isPass ? 'pass-indicator' : 'fail-indicator'} text-xs">
                      ${ratingStats.isPass ? '✅ Lolos' : '❌ Tidak Lolos'}
                    </span>
                  </div>
                ` : `
                  <div class="mt-2 text-xs text-gray-400 italic">Belum direview</div>
                `}
                
                ${hasRating && status ? `
                  <button onclick="event.stopPropagation(); undoStatus('${candidate.nama.replace(/'/g, "\\'")}', '${state.currentDivisi}')" 
                          class="btn-undo mt-2 hover:bg-gray-700 transition">
                    ↩️ Undo
                  </button>
                ` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // ⭐ CANDIDATE ACTIONS
    function selectDivision(divisi) {
      state.currentDivisi = divisi;
      
      // Update active state in nav
      document.querySelectorAll('#divisionNav button').forEach(btn => {
        btn.classList.remove('bg-blue-100', 'text-blue-700', 'font-medium');
      });
      event.currentTarget.classList.add('bg-blue-100', 'text-blue-700', 'font-medium');
      
      renderQuotaDisplay();
      loadDashboardData();
      
      // Close mobile sidebar
      if (window.innerWidth < 1024) {
        toggleSidebar();
      }
    }

    async function openCandidateDetail(nama, divisi) {
      const candidate = state.candidates.find(c => c.nama === nama);
      if (!candidate) return;
      
      // If already has rating for this division, show detail view
      if (candidate.ratings[divisi]) {
        // Could open detail modal here
        showToast(`📋 ${candidate.nama} - ${candidate.ratings[divisi].divName}: ⭐${candidate.ratings[divisi].rating}`);
      } else {
        // Open rating modal
        openModal(candidate, divisi);
      }
    }

    async function saveReview() {
      if (!state.currentCandidate || !state.selectedRating) return;
      
      const comment = document.getElementById('reviewComment').value.trim();
      if (comment.length < 100) {
        showToast('❌ Komentar minimal 100 karakter', 'error');
        return;
      }
      
      showToast('💾 Menyimpan...');
      
      const result = await apiCall('saveRating', {
        rowIndex: state.currentCandidate.ratings[state.currentCandidate.currentDivisi]?.rowIndex || '',
        rating: state.selectedRating,
        catatan: comment,
        divisi: state.currentCandidate.currentDivisi
      }, 'POST');
      
      if (result.success) {
        showToast('✅ Review berhasil disimpan!', 'success');
        closeModal();
        await loadDashboardData(); // Refresh data
      } else {
        showToast('❌ ' + (result.message || 'Gagal menyimpan'), 'error');
      }
    }

    async function undoStatus(nama, divisi) {
      if (!confirm('🔄 Yakin ingin membatalkan status seleksi untuk ' + nama + '?')) return;
      
      const candidate = state.candidates.find(c => c.nama === nama);
      if (!candidate) return;
      
      showToast('↩️ Membatalkan...');
      
      const result = await apiCall('undoSelectionStatus', {
        rowIndex: candidate.ratings[divisi]?.rowIndex || '',
        divisi: divisi
      }, 'POST');
      
      if (result.success) {
        showToast('✅ Status berhasil dibatalkan', 'success');
        await loadDashboardData();
      } else {
        showToast('❌ ' + (result.message || 'Gagal membatalkan'), 'error');
      }
    }

    // ⭐ SELECTION STATUS BUTTONS (for detail view)
    async function updateStatus(rowIndex, divisi, status) {
      showToast('💾 Mengupdate status...');
      
      const result = await apiCall('updateSelectionStatus', {
        rowIndex: rowIndex,
        divisi: divisi,
        status: status
      }, 'POST');
      
      if (result.success) {
        showToast(`✅ Status: ${status.toUpperCase()}`, 'success');
        await loadDashboardData();
      } else {
        showToast('❌ ' + (result.message || 'Gagal update status'), 'error');
      }
    }

    // ⭐ UTILITIES
    function showLoading(show) {
      document.getElementById('loadingState').classList.toggle('hidden', !show);
      document.getElementById('candidatesGrid').classList.toggle('hidden', show);
    }

    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }

    // ⭐ EXPOSE FUNCTIONS FOR INLINE HANDLERS
    window.selectDivision = selectDivision;
    window.openCandidateDetail = openCandidateDetail;
    window.undoStatus = undoStatus;
    window.updateStatus = updateStatus;
  </script>
</body>
</html>
