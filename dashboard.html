<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Review SHC 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13; --card-bg: #1a1a22; --card-border: #2e2e3d;
      --accent: #7c6bff; --accent-soft: #2a2545;
      --text-primary: #f0eeff; --text-muted: #9390ad;
      --star-1: #ff5c5c; --star-2: #ff9a3c; --star-3: #6dcf81; --star-4: #7c6bff;
      --radius: 16px; --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }
    
    /* LAYOUT */
    .app-container { display: flex; min-height: 100vh; }
    
    /* SIDEBAR */
    .sidebar { width: 280px; background: var(--card-bg); border-right: 1px solid var(--card-border); padding: 24px 16px; overflow-y: auto; }
    .sidebar-header { margin-bottom: 24px; }
    .sidebar-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .sidebar-sub { font-size: 12px; color: var(--text-muted); }
    .divisi-list { display: flex; flex-direction: column; gap: 6px; }
    .divisi-item { background: transparent; border: none; border-radius: 10px; padding: 12px 14px; color: var(--text-muted); font-size: 14px; font-weight: 600; cursor: pointer; text-align: left; transition: all 0.2s; }
    .divisi-item:hover { background: rgba(124,107,255,0.1); color: var(--text-primary); }
    .divisi-item.active { background: var(--accent-soft); color: var(--accent); border-left: 3px solid var(--accent); }
    
    /* MAIN CONTENT */
    .main-content { flex: 1; padding: 24px; overflow-y: auto; }
    .header { margin-bottom: 24px; }
    .header-title { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .header-sub { font-size: 14px; color: var(--text-muted); }
    
    .stats-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 16px; flex: 1; min-width: 140px; }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 800; color: var(--accent); }
    
    .kandidat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .kandidat-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: all 0.2s; animation: fadeIn 0.3s; }
    .kandidat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: var(--accent); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .card-photo-wrap { width: 100%; aspect-ratio: 3/4; background: #111118; overflow: hidden; }
    .card-photo { width: 100%; height: 100%; object-fit: cover; }
    .card-photo-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 13px; }
    
    .card-body { padding: 16px; }
    .kandidat-nama { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .kandidat-kelas { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
    .kandidat-divisi { font-size: 12px; color: var(--accent); margin-bottom: 8px; }
    
    .rating-preview { display: flex; gap: 4px; align-items: center; }
    .rating-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
    .rating-badge[data-rating="1"] { background: rgba(255,92,92,0.15); color: var(--star-1); }
    .rating-badge[data-rating="2"] { background: rgba(255,154,60,0.15); color: var(--star-2); }
    .rating-badge[data-rating="3"] { background: rgba(109,207,129,0.15); color: var(--star-3); }
    .rating-badge[data-rating="4"] { background: rgba(124,107,255,0.15); color: var(--star-4); }
    
    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 999; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; animation: fadeIn 0.2s; }
    .modal-content { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal-header { position: sticky; top: 0; background: var(--card-bg); border-bottom: 1px solid var(--card-border); padding: 20px; z-index: 10; }
    .modal-close { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.05); border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; }
    .modal-close:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
    .modal-body { padding: 20px; }
    .modal-foto { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 12px; margin-bottom: 16px; }
    .modal-nama { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .modal-kelas { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
    .section-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; font-weight: 700; }
    .rating-list { display: flex; flex-direction: column; gap: 12px; }
    .rating-item { background: rgba(255,255,255,0.03); border-left: 3px solid var(--accent); border-radius: 10px; padding: 14px; }
    .rating-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .rating-divisi { font-size: 14px; font-weight: 700; }
    .rating-value { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: 700; }
    .rating-value[data-rating="1"] { background: rgba(255,92,92,0.2); color: var(--star-1); }
    .rating-value[data-rating="2"] { background: rgba(255,154,60,0.2); color: var(--star-2); }
    .rating-value[data-rating="3"] { background: rgba(109,207,129,0.2); color: var(--star-3); }
    .rating-value[data-rating="4"] { background: rgba(124,107,255,0.2); color: var(--star-4); }
    .rating-alasan { font-size: 14px; color: var(--text-primary); line-height: 1.6; white-space: pre-wrap; }
    
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; }
    .spinner { width: 44px; height: 44px; border: 3px solid rgba(124,107,255,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 64px; margin-bottom: 16px; }
    .empty-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .empty-sub { color: var(--text-muted); font-size: 14px; }
    
    .hidden { display: none !important; }
    
    /* MOBILE */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { padding: 16px; }
      .kandidat-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">📊 Dashboard Review</div>
        <div class="sidebar-sub">Filter berdasarkan divisi</div>
      </div>
      <div class="divisi-list" id="divisiList">
        <!-- Divisi buttons akan di-render di sini -->
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="header">
        <div class="header-title" id="headerTitle">Dashboard Review SHC 2026</div>
        <div class="header-sub" id="headerSub">Kandidat yang sudah direview</div>
      </div>

      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-label">Total Kandidat</div>
          <div class="stat-value" id="statTotal">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Sudah Direview</div>
          <div class="stat-value" id="statReviewed">-</div>
        </div>
      </div>

      <!-- LOADING STATE -->
      <div id="loadingState" class="loading">
        <div class="spinner"></div>
        <div style="color: var(--text-muted); font-size: 14px;">Memuat data...</div>
      </div>

      <!-- KANDIDAT GRID -->
      <div id="kandidatGrid" class="kandidat-grid hidden"></div>

      <!-- EMPTY STATE -->
      <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">📭</div>
        <div class="empty-title">Belum Ada Review</div>
        <div class="empty-sub">Belum ada kandidat yang sudah direview di divisi ini.</div>
      </div>
    </div>
  </div>

  <!-- MODAL DETAIL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Content akan di-render di sini -->
      </div>
    </div>
  </div>

  <script>
    // ⚠️ PENTING: Ganti URL ini dengan Web App URL dari Apps Script kamu
    const API_BASE = "https://script.google.com/macros/s/AKfycbwamPmLwc_INw6u4bj2shO8RIXbcrHiuoUvhwPCBNhFG0VNCoilqZV1jUfh9EmeDusO/exec";
    
    let currentDivisi = 'all';
    let allData = [];

    // ===== API HELPER =====
    async function apiFetch(action, params = {}) {
      const url = new URL(API_BASE);
      url.searchParams.append('action', action);
      Object.keys(params).forEach(key => {
        if (params[key] !== null && params[key] !== undefined) {
          url.searchParams.append(key, params[key]);
        }
      });
      
      const response = await fetch(url);
      if (!response.ok) throw new Error('Network error');
      return await response.json();
    }

    // ===== INIT =====
    window.addEventListener('load', init);

    async function init() {
      try {
        // Load divisi list untuk sidebar
        const divisiResult = await apiFetch('getDashboardDivisions');
        if (!divisiResult.success) throw new Error(divisiResult.error);
        renderDivisiList(divisiResult.data);
        
        // Load data awal (semua divisi)
        await loadDashboardData('all');
      } catch (err) {
        showError(err.message);
      }
    }

    function renderDivisiList(divisions) {
      const list = document.getElementById('divisiList');
      list.innerHTML = '';
      
      divisions.forEach(div => {
        const btn = document.createElement('button');
        btn.className = 'divisi-item';
        if (div.id === 'all') btn.classList.add('active');
        btn.textContent = div.name;
        btn.onclick = () => selectDivisi(div.id, div.name);
        list.appendChild(btn);
      });
    }

    async function selectDivisi(divId, divName) {
      currentDivisi = divId;
      
      // Update active state
      document.querySelectorAll('.divisi-item').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      
      // Update header
      document.getElementById('headerTitle').textContent = divId === 'all' ? 'Semua Kandidat' : divName;
      
      // Load data
      await loadDashboardData(divId === 'all' ? null : divId);
    }

    async function loadDashboardData(divisi) {
      showLoading(true);
      
      try {
        const result = await apiFetch('getDashboardData', divisi ? { divisi } : {});
        if (!result.success) throw new Error(result.error);
        
        allData = result.data;
        renderKandidatGrid(allData);
        updateStats(allData);
        
      } catch (err) {
        showError(err.message);
      } finally {
        showLoading(false);
      }
    }

    function renderKandidatGrid(data) {
      const grid = document.getElementById('kandidatGrid');
      const emptyState = document.getElementById('emptyState');
      
      if (!data || data.length === 0) {
        grid.classList.add('hidden');
        emptyState.classList.remove('hidden');
        return;
      }
      
      emptyState.classList.add('hidden');
      grid.classList.remove('hidden');
      grid.innerHTML = '';
      
      data.forEach(kandidat => {
        const card = document.createElement('div');
        card.className = 'kandidat-card';
        card.onclick = () => showModal(kandidat);
        
        // Hitung rata-rata rating untuk preview
        const ratings = Object.values(kandidat.ratings);
        const avgRating = ratings.length > 0 
          ? Math.round(ratings.reduce((sum, r) => sum + r.rating, 0) / ratings.length) 
          : 0;
        
        card.innerHTML = `
          <div class="card-photo-wrap">
            ${kandidat.foto 
              ? `<img class="card-photo" src="${escHtml(kandidat.foto)}" alt="Foto" onerror="this.parentElement.innerHTML='<div class=\\'card-photo-placeholder\\'>Foto tidak tersedia</div>'">` 
              : '<div class="card-photo-placeholder">Foto tidak tersedia</div>'}
          </div>
          <div class="card-body">
            <div class="kandidat-nama">${escHtml(kandidat.nama)}</div>
            <div class="kandidat-kelas">Kelas ${escHtml(kandidat.kelas)}</div>
            <div class="kandidat-divisi">Dilamar: ${kandidat.divisiDilamar.join(', ')}</div>
            <div class="rating-preview">
              <span class="rating-badge" data-rating="${avgRating}">⭐ ${avgRating}/4</span>
              <span style="font-size: 11px; color: var(--text-muted);">(${ratings.length} divisi)</span>
            </div>
          </div>
        `;
        
        grid.appendChild(card);
      });
    }

    function showModal(kandidat) {
      const modal = document.getElementById('modalOverlay');
      const body = document.getElementById('modalBody');
      
      let ratingsHtml = '';
      Object.values(kandidat.ratings).forEach(r => {
        ratingsHtml += `
          <div class="rating-item">
            <div class="rating-header">
              <div class="rating-divisi">${escHtml(r.divName)}</div>
              <div class="rating-value" data-rating="${r.rating}">⭐ ${r.rating}/4</div>
            </div>
            <div class="rating-alasan">${escHtml(r.alasan)}</div>
          </div>
        `;
      });
      
      body.innerHTML = `
        ${kandidat.foto 
          ? `<img class="modal-foto" src="${escHtml(kandidat.foto)}" alt="Foto" onerror="this.style.display='none'">` 
          : ''}
        <div class="modal-nama">${escHtml(kandidat.nama)}</div>
        <div class="modal-kelas">Kelas ${escHtml(kandidat.kelas)}</div>
        
        <div class="section-title">Rating dari Setiap Divisi</div>
        <div class="rating-list">
          ${ratingsHtml}
        </div>
      `;
      
      modal.classList.add('show');
    }

    function closeModal(e) {
      if (!e || e.target.id === 'modalOverlay') {
        document.getElementById('modalOverlay').classList.remove('show');
      }
    }

    function updateStats(data) {
      document.getElementById('statTotal').textContent = data.length;
      document.getElementById('statReviewed').textContent = data.length;
    }

    function showLoading(show) {
      document.getElementById('loadingState').classList.toggle('hidden', !show);
      document.getElementById('kandidatGrid').classList.toggle('hidden', show);
      document.getElementById('emptyState').classList.add('hidden');
    }

    function showError(msg) {
      const emptyState = document.getElementById('emptyState');
      emptyState.innerHTML = `
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Error</div>
        <div class="empty-sub">${escHtml(msg)}</div>
      `;
      emptyState.classList.remove('hidden');
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('kandidatGrid').classList.add('hidden');
    }

    function escHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
